<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L A Lenguas y Artes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const supabaseUrl = 'https://zjnourjlpssxjbrtndxu.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqbm91cmpscHNzeGpicnRuZHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODU4MDMsImV4cCI6MjA5NTM2MTgwM30.153hHzbc95F3L1mczZCP1roLyW_CF1t08YjiKZTOSwk';
        const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

        function Login({ onLogin }) {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    setError(error.message);
                } else {
                    onLogin(data.user);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100">
                    <div className="bg-white p-8 rounded-lg shadow-md w-96">
                        <h1 className="text-2xl font-bold mb-6 text-center">L A Lenguas y Artes</h1>
                        <form onSubmit={handleLogin}>
                            <input type="email" placeholder="Email" className="w-full p-2 border rounded mb-4" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Contraseña" className="w-full p-2 border rounded mb-4" value={password} onChange={e => setPassword(e.target.value)} />
                            {error && <p className="text-red-500 mb-4">{error}</p>}
                            <button type="submit" className="w-full bg-blue-500 text-white p-2 rounded">Ingresar</button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ user, onLogout }) {
            const [alumnos, setAlumnos] = React.useState([]);

            React.useEffect(() => {
                cargarAlumnos();
            }, []);

            const cargarAlumnos = async () => {
                const { data } = await supabase.from('alumnos').select('*');
                if (data) setAlumnos(data);
            };

            return (
                <div>
                    <div className="bg-white shadow p-4 flex justify-between">
                        <h1 className="text-xl font-bold">L A Lenguas y Artes</h1>
                        <button onClick={onLogout} className="bg-red-500 text-white px-4 py-2 rounded">Salir</button>
                    </div>
                    <div className="p-4">
                        <h2 className="text-lg font-bold mb-4">Alumnos: {alumnos.length}</h2>
                        <div className="bg-white rounded shadow">
                            <table className="w-full">
                                <thead className="bg-gray-200">
                                    <tr><th className="p-2">Nombre</th><th className="p-2">DNI</th><th className="p-2">Nivel</th></tr>
                                </thead>
                                <tbody>
                                    {alumnos.map(a => (
                                        <tr key={a.id} className="border-t">
                                            <td className="p-2">{a.nombre} {a.apellido}</td>
                                            <td className="p-2">{a.dni}</td>
                                            <td className="p-2">{a.nivel}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = React.useState(null);
            const [rol, setRol] = React.useState(null);

            React.useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session?.user) {
                        setUser(session.user);
                        cargarRol(session.user.id);
                    }
                });
            }, []);

            const cargarRol = async (userId) => {
                const { data } = await supabase.from('perfiles_usuarios').select('rol').eq('id', userId).single();
                if (data) setRol(data.rol);
            };

            if (!user) return <Login onLogin={setUser} />;
            return <Dashboard user={user} onLogout={() => supabase.auth.signOut().then(() => setUser(null))} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
